<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380" font-family="Lato, sans-serif">
  <!-- Background -->
  <rect width="800" height="380" fill="#1a1a1a" rx="8"/>

  <!-- Divider -->
  <line x1="400" y1="30" x2="400" y2="350" stroke="#333" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- === LEFT PANEL: Chat Interface === -->
  <text x="200" y="58" text-anchor="middle" fill="#888" font-size="11" letter-spacing="2" font-weight="700">BEFORE</text>
  <text x="200" y="80" text-anchor="middle" fill="#ccc" font-size="16" font-weight="300">Chat Interface</text>

  <!-- Person -->
  <circle cx="80" cy="160" r="18" fill="none" stroke="#555" stroke-width="1.5"/>
  <text x="80" y="165" text-anchor="middle" fill="#777" font-size="13">👤</text>

  <!-- Isolated chat bubbles -->
  <rect x="118" y="110" width="130" height="34" rx="6" fill="#252525" stroke="#333" stroke-width="1"/>
  <text x="183" y="130" text-anchor="middle" fill="#666" font-size="10">paste code... explain again...</text>

  <rect x="118" y="155" width="130" height="34" rx="6" fill="#252525" stroke="#333" stroke-width="1"/>
  <text x="183" y="175" text-anchor="middle" fill="#666" font-size="10">new conversation, start over</text>

  <rect x="118" y="200" width="130" height="34" rx="6" fill="#252525" stroke="#333" stroke-width="1"/>
  <text x="183" y="220" text-anchor="middle" fill="#666" font-size="10">paste code... explain again...</text>

  <!-- Arrows between bubbles (showing repetition) -->
  <path d="M 118 162 Q 100 171 118 180" stroke="#3a3a3a" stroke-width="1.5" fill="none" marker-end="url(#arr-grey)"/>
  <path d="M 118 207 Q 100 216 118 225" stroke="#3a3a3a" stroke-width="1.5" fill="none" marker-end="url(#arr-grey)"/>

  <!-- "No memory" label -->
  <text x="200" y="268" text-anchor="middle" fill="#c0392b" font-size="11">✕  no shared context</text>
  <text x="200" y="286" text-anchor="middle" fill="#c0392b" font-size="11">✕  resets every session</text>

  <!-- === RIGHT PANEL: AI Workspace === -->
  <text x="600" y="58" text-anchor="middle" fill="#888" font-size="11" letter-spacing="2" font-weight="700">AFTER</text>
  <text x="600" y="80" text-anchor="middle" fill="#ccc" font-size="16" font-weight="300">AI Workspace</text>

  <!-- Central AI node -->
  <circle cx="600" cy="185" r="30" fill="#1a2a3a" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="600" y="181" text-anchor="middle" fill="#7eb8f7" font-size="10" font-weight="700">AI</text>
  <text x="600" y="195" text-anchor="middle" fill="#7eb8f7" font-size="9">context</text>

  <!-- Surrounding nodes -->
  <rect x="448" y="108" width="68" height="28" rx="5" fill="#1e2a1e" stroke="#3fb950" stroke-width="1"/>
  <text x="482" y="126" text-anchor="middle" fill="#3fb950" font-size="10">code</text>

  <rect x="448" y="168" width="68" height="28" rx="5" fill="#2a2010" stroke="#f0a500" stroke-width="1"/>
  <text x="482" y="186" text-anchor="middle" fill="#f0a500" font-size="10">docs</text>

  <rect x="448" y="228" width="68" height="28" rx="5" fill="#21183a" stroke="#b56bff" stroke-width="1"/>
  <text x="482" y="246" text-anchor="middle" fill="#b56bff" font-size="10">datasets</text>

  <rect x="684" y="108" width="68" height="28" rx="5" fill="#1a2a3a" stroke="#4a9eff" stroke-width="1"/>
  <text x="718" y="126" text-anchor="middle" fill="#4a9eff" font-size="10">schemas</text>

  <rect x="684" y="168" width="68" height="28" rx="5" fill="#1e2a1e" stroke="#3fb950" stroke-width="1"/>
  <text x="718" y="186" text-anchor="middle" fill="#3fb950" font-size="10">pipelines</text>

  <rect x="684" y="228" width="68" height="28" rx="5" fill="#2a2010" stroke="#f0a500" stroke-width="1"/>
  <text x="718" y="246" text-anchor="middle" fill="#f0a500" font-size="10">history</text>

  <!-- Connecting lines to AI node -->
  <line x1="516" y1="122" x2="572" y2="163" stroke="#2a3a2a" stroke-width="1.2"/>
  <line x1="516" y1="182" x2="570" y2="182" stroke="#2a2a10" stroke-width="1.2"/>
  <line x1="516" y1="242" x2="572" y2="207" stroke="#211828" stroke-width="1.2"/>
  <line x1="684" y1="122" x2="628" y2="163" stroke="#1a2535" stroke-width="1.2"/>
  <line x1="684" y1="182" x2="630" y2="182" stroke="#1a2a1a" stroke-width="1.2"/>
  <line x1="684" y1="242" x2="628" y2="207" stroke="#1a2010" stroke-width="1.2"/>

  <!-- "Benefits" label -->
  <text x="600" y="300" text-anchor="middle" fill="#3fb950" font-size="11">✓  context persists</text>
  <text x="600" y="318" text-anchor="middle" fill="#3fb950" font-size="11">✓  everything connected</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr-grey" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#3a3a3a"/>
    </marker>
  </defs>
</svg>
